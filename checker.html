<!DOCTYPE html>
<html>

<head>
    <title>URL Checker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #eef2f7;
        }

        .box {
            background: white;
            padding: 30px;
            width: 650px;
            margin: 40px auto;
            border-radius: 12px;
        }

        input {
            width: 90%;
            padding: 12px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            margin-top: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .safe {
            color: green;
        }

        .warn {
            color: orange;
        }

        .danger {
            color: red;
        }

        ul {
            text-align: left;
        }

        /* Dark mode base */
        body.dark {
            background: #0f172a;
            color: #e5e7eb;
        }

        body.dark .card,
        body.dark .box {
            background: #1e293b;
            color: #e5e7eb;
        }

        body.dark a,
        body.dark button {
            background: #3b82f6;
            color: white;
        }

        body.dark input {
            background: #111827;
            color: white;
            border: 1px solid #374151;
        }

        .dark-toggle {
            position: fixed;
            top: 15px;
            right: 20px;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            z-index: 1000;
        }

        .risk-bar {
            width: 100%;
            height: 22px;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0 5px;
        }

        #riskFill {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.6s ease;
            background: linear-gradient(90deg, #22c55e, #facc15, #ef4444);
        }

        .risk-labels {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        body.dark .risk-bar {
            background: #374151;
        }   
    </style>
</head>

<body>
    <button class="dark-toggle" onclick="toggleDark()">🌙</button>

    <div class="box">
        <h2>🔍 URL Safety Analyzer</h2>

        <input id="urlInput" placeholder="Enter URL">
        <br>
        <button onclick="analyze()">Analyze</button>

        <div id="result"></div>
        <div class="risk-bar">
            <div id="riskFill"></div>
        </div>

        <div class="risk-labels">
            <span>Safe</span>
            <span>Suspicious</span>
        </div>

        <div id="reasons"></div>

        <a href="index.html">⬅ Back Home</a>
    </div>

    <script>
        function analyze() {
            let url = document.getElementById("urlInput").value.trim();
            let score = 0;
            let reasons = [];
            let positives = [];

            if (!url) {
                alert("Enter a URL first.");
                return;
            }

            if (url.length > 75) {
                score += 2;
                reasons.push("URL too long (phishing links often hide info).");
            } else {
                positives.push("Reasonable URL length.");
            }

            if (!url.startsWith("https://")) {
                score += 2;
                reasons.push("Not using HTTPS encryption.");
            } else {
                positives.push("Uses HTTPS encryption.");
            }

            if (/(\d{1,3}\.){3}\d{1,3}/.test(url)) {
                score += 3;
                reasons.push("IP address instead of domain name.");
            } else {
                positives.push("Uses a proper domain name.");
            }

            let words = ["login", "verify", "bank", "secure", "update", "free", "claim", "account"];
            for (let w of words) {
                if (url.toLowerCase().includes(w)) {
                    score += 2;
                    reasons.push("Contains suspicious keyword: " + w);
                    break;
                }
            }

            if ((url.match(/\./g) || []).length > 3) {
                score += 2;
                reasons.push("Too many subdomains.");
            }

            let short = ["bit.ly", "tinyurl", "t.co"];
            for (let s of short) {
                if (url.includes(s)) {
                    score += 3;
                    reasons.push("Shortened URL detected.");
                    break;
                }
            }

            if (url.includes("@")) {
                score += 2;
                reasons.push("@ symbol can hide real destination.");
            }

            show(score, reasons, positives);
        }

        function show(score, reasons, positives) {
            let r = document.getElementById("result");
            let rs = document.getElementById("reasons");

            let label, cls;

            if (score <= 3) {
                label = "✅ SAFE";
                cls = "safe";
            }
            else if (score <= 7) {
                label = "⚠️ SUSPICIOUS";
                cls = "warn";
            }
            else {
                label = "🚨 DANGEROUS";
                cls = "danger";
            }

            r.className = cls;
            r.innerHTML = "<h2>" + label + " (Score " + score + ")</h2>";

            let html = "";

            if (reasons.length) {
                html += "<h3>⚠ Why suspicious:</h3><ul>";
                html += reasons.map(x => "<li>" + x + "</li>").join("");
                html += "</ul>";
            }

            if (positives.length) {
                html += "<h3>✅ Why it may be safe:</h3><ul>";
                html += positives.map(x => "<li>" + x + "</li>").join("");
                html += "</ul>";
            }

            rs.innerHTML = html;
            let percent = Math.min((score / 10) * 100, 100);
            document.getElementById("riskFill").style.width = percent + "%";

        }

        function toggleDark() {
            document.body.classList.toggle("dark");
            localStorage.setItem(
                "darkMode",
                document.body.classList.contains("dark")
            );
        }

        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark");
        }
    </script>

</body>

</html>
