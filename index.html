<!DOCTYPE html>
<html>

<head>
    <title>URL Safety Checker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f8;
        }

        .card {
            background: white;
            padding: 30px;
            margin: 40px auto;
            width: 600px;
            border-radius: 12px;
        }

        a {
            display: block;
            margin: 15px;
            padding: 12px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        /* Dark mode base */
        body.dark {
            background: #0f172a;
            color: #e5e7eb;
        }

        /* Cards / boxes */
        body.dark .card,
        body.dark .box {
            background: #1e293b;
            color: #e5e7eb;
        }

        /* Buttons & links */
        body.dark a,
        body.dark button {
            background: #3b82f6;
            color: white;
        }

        /* Inputs */
        body.dark input {
            background: #111827;
            color: white;
            border: 1px solid #374151;
        }

        /* Dark mode toggle button position */
        .dark-toggle {
            position: fixed;
            top: 15px;
            right: 20px;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            z-index: 1000;
        }

        /* Dark mode styles */
        body.dark {
            background: #0f172a;
            color: #e5e7eb;
        }

        body.dark .card,
        body.dark .box {
            background: #1e293b;
            color: #e5e7eb;
        }

        body.dark a,
        body.dark button {
            background: #3b82f6;
            color: white;
        }

        body.dark input {
            background: #111827;
            color: white;
            border: 1px solid #374151;
        }
    </style>
</head>

<body>
    <button class="dark-toggle" onclick="toggleDark()">🌙</button>


    <div class="card">
        <h1>🛡️ URL Safety Checker</h1>
        <p>Hackathon Project — Detect Suspicious Links</p>

        <a href="checker.html">🔍 Check a URL</a>
        <a href="learn.html">📚 Learn About Malicious URLs</a>
        <a href="quiz.html">🧪 Test Yourself</a>

        <p>This tool helps users identify phishing and malicious links using rule-based detection.</p>
    </div>
    <script>
        function toggleDark() {
            document.body.classList.toggle("dark");
            localStorage.setItem("darkMode",
                document.body.classList.contains("dark"));
        }

        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark");
        }

        function toggleDark() {
            document.body.classList.toggle("dark");
            localStorage.setItem(
                "darkMode",
                document.body.classList.contains("dark")
            );
        }

        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark");
        }


    </script>

</body>

</html>
