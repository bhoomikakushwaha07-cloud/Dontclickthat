<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureURL - Among Us Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg-dark:#0b0f1a;
    --sidebar:#141a2e;
    --glass:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.12);
    --red:#ff4d4d;
    --cyan:#22d3ee;
    --yellow:#facc15;
    --green:#22c55e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at 20% 20%, #1e293b, #0b0f1a 60%);
    color:white;
    display:flex;
    min-height:100vh;
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:260px;
    background:var(--sidebar);
    padding:40px 20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border-right:1px solid var(--border);
}

.logo{
    font-family:'Orbitron',sans-serif;
    font-size:22px;
    text-align:center;
    margin-bottom:40px;
    color:var(--cyan);
}

.nav{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.nav button{
    padding:14px;
    border-radius:14px;
    border:none;
    background:var(--glass);
    color:white;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.nav button:hover{
    background:var(--cyan);
    color:black;
    transform:translateX(5px);
}

/* ===== MAIN CONTENT ===== */

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.card{
    background:var(--glass);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);
    border-radius:25px;
    padding:40px;
    width:100%;
    max-width:650px;
    box-shadow:0 30px 60px rgba(0,0,0,0.5);
    text-align:center;
}

/* ===== INPUTS ===== */

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border-radius:15px;
    border:none;
    outline:none;
    font-size:15px;
}

input:focus{
    box-shadow:0 0 0 3px var(--cyan);
}

.action-btn{
    margin-top:20px;
    padding:14px;
    width:100%;
    border-radius:15px;
    border:none;
    font-weight:600;
    cursor:pointer;
    background:var(--red);
    color:white;
    transition:0.3s;
}

.action-btn:hover{
    background:var(--yellow);
    color:black;
}

/* ===== RISK BAR ===== */

.risk-bar{
    margin-top:20px;
    height:12px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
}

#riskFill{
    height:100%;
    width:0%;
    transition:0.5s;
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){
    body{flex-direction:column;}
    .sidebar{
        width:100%;
        flex-direction:row;
        justify-content:space-around;
        align-items:center;
    }
    .nav{
        flex-direction:row;
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <div>
        <div class="logo">🚀 SecureURL</div>
        <div class="nav">
            <button onclick="show('home')">🏠 Home</button>
            <button onclick="show('scan')">🔍 Scan</button>
            <button onclick="show('learn')">📚 Learn</button>
            <button onclick="show('quiz')">🎮 Quiz</button>
        </div>
    </div>
    <div style="text-align:center; opacity:0.5; font-size:12px;">
        Among Us Edition
    </div>
</div>

<div class="main">
    <div class="card" id="content">
        <h1>Welcome Crew Member 👨‍🚀</h1>
        <p style="margin-top:15px;">Scan URLs to detect suspicious impostors.</p>
    </div>
</div>

<script>

function show(section){
    const content=document.getElementById("content");

    if(section==="home"){
        content.innerHTML=`
        <h1>Welcome Crew Member 👨‍🚀</h1>
        <p style="margin-top:15px;">Scan URLs to detect suspicious impostors.</p>`;
    }

    if(section==="scan"){
        content.innerHTML=`
        <h2>🔍 Scan for Impostor Links</h2>
        <input id="urlInput" placeholder="Enter suspicious URL">
        <button class="action-btn" onclick="analyze()">Scan Now</button>
        <div id="result" style="margin-top:20px;"></div>
        <div class="risk-bar">
            <div id="riskFill"></div>
        </div>
        <div id="reasons" style="margin-top:20px;"></div>`;
    }

    if(section==="learn"){
        content.innerHTML=`
        <h2>📚 How to Spot an Impostor</h2>
        <ul style="margin-top:20px; line-height:28px; text-align:left;">
            <li>Long suspicious URLs</li>
            <li>No HTTPS encryption</li>
            <li>IP address instead of domain</li>
            <li>Fake login or verify keywords</li>
        </ul>`;
    }

    if(section==="quiz"){
        content.innerHTML=`
        <h2>🎮 Impostor Quiz</h2>
        <p style="margin-top:20px;">Coming Soon 🚀</p>`;
    }
}

function analyze(){
    let url=document.getElementById("urlInput").value.trim();
    let score=0,reasons=[];

    if(!url) return alert("Enter URL");

    if(url.length>75){score+=2;reasons.push("Too long — Sus!");}
    if(!url.startsWith("https://")){score+=2;reasons.push("No HTTPS — Suspicious!");}
    if(/(\d{1,3}\.){3}\d{1,3}/.test(url)){score+=3;reasons.push("IP detected — Impostor!");}

    let color,label;
    if(score<=3){label="CREW SAFE";color="#22c55e";}
    else if(score<=7){label="SUSPECTED";color="#facc15";}
    else{label="IMPOSTOR ALERT";color="#ff4d4d";}

    document.getElementById("result").innerHTML=
        `<h3 style="color:${color};">${label}</h3>`;

    document.getElementById("riskFill").style.width=(score/10*100)+"%";
    document.getElementById("riskFill").style.background=color;

    document.getElementById("reasons").innerHTML=
        reasons.length?"<ul>"+reasons.map(r=>"<li>"+r+"</li>").join("")+"</ul>":"";
}

</script>

</body>
</html>
